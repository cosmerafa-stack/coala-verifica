name: Verificar Sefaz-BA / NFe / CTe

on:
  # A cada 30 min. O runner windows-latest consome minutos do plano gratuito do
  # GitHub (2000 min/mês, com multiplicador 2x pra Windows — repositório é
  # privado). Nessa cadência dá ~1440 min/mês faturados, dentro do limite grátis
  # com folga. Pra rodar mais rápido, ou o repositório vira público (Actions
  # ilimitado) ou é preciso habilitar cobrança na conta do GitHub.
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  verificar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rodar verificação
        shell: powershell
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: web/scripts/verificar-sefaz.ps1
