name: Verificar Sefaz-BA / NFe / CTe

on:
  # O agendamento nativo do GitHub Actions ("schedule:") se mostrou nada
  # confiável — chegou a ficar mais de 10h sem disparar um job configurado pra
  # rodar a cada 30 min. Quem dispara esse workflow agora é o pg_cron do
  # Supabase (função "disparar-verificacao-sefaz", a cada 30 min), que nunca
  # falhou. workflow_dispatch fica só pra teste manual.
  workflow_dispatch: {}

jobs:
  verificar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rodar verificação
        shell: powershell
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: web/scripts/verificar-sefaz.ps1
