name: Verificar Sefaz-BA / NFe / CTe

on:
  # Desativado: nfe.fazenda.gov.br / cte.fazenda.gov.br / sefaz.ba.gov.br bloqueiam
  # os ranges de IP do GitHub Actions (mesmo "Connection reset by peer" do Supabase
  # Edge Functions). Deixado como workflow_dispatch pra testar se um dia parar de bloquear.
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Rodar verificação
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: deno run --allow-net --allow-env web/scripts/verificar-sefaz.ts
